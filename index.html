<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#F6F6F4" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta
      name="description"
      content="Claim your free $SHIBSHIB allocation on BNB Smart Chain. 500K tokens per claim, unlimited claims."
    />
    <title>ShibShib — Free $SHIBSHIB Airdrop on BSC</title>
    <script>
      // Keep stale app assets fresh WITHOUT destroying wallet sessions.
      // NOTE: we intentionally do NOT clear wagmi / WalletConnect (wc@, w3m) keys here.
      // On mobile, connecting deep-links out to the wallet app and back to the browser,
      // which reloads the page; wiping those keys would delete the pending WalletConnect
      // session mid-handshake and break every mobile connection.
      (function () {
        // Unregister any old service workers (no wallet state lives here).
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            regs.forEach(function (reg) { reg.unregister(); });
          });
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
